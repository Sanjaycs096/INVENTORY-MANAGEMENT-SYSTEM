# Application Configuration
spring.application.name=inventory-management-system
server.port=${PORT:8080}

# Database Configuration (Supabase PostgreSQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-init-sql=SET search_path=public

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production-make-it-very-long-and-secure}
jwt.expiration=86400000

# Logging Configuration — keep INFO only; DEBUG levels slow every request
logging.level.root=WARN
logging.level.com.inventory=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Error Handling
server.error.include-message=always
server.error.include-stacktrace=on_param

# CORS Configuration — add your Vercel frontend URL here
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://localhost:8000,http://127.0.0.1:8000,https://inventtrack-eta.vercel.app}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
