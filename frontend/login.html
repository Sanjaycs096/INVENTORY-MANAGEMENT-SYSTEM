<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InvenTrack</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea, #764ba2, #f64f59, #c471ed, #667eea);
            background-size: 350% 350%;
            animation: gradientShift 10s ease infinite;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatBubble {
            0%   { transform: translateY(0) scale(1); opacity: 0.15; }
            50%  { transform: translateY(-80px) scale(1.1); opacity: 0.28; }
            100% { transform: translateY(0) scale(1); opacity: 0.15; }
        }

        @keyframes loginCardIn {
            from { opacity: 0; transform: translateY(32px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            animation: floatBubble ease-in-out infinite;
            pointer-events: none;
        }

        .login-card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            color: var(--primary-color);
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--gray-600);
        }

        .login-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.5rem;
        }

        .login-form .form-group {
            position: relative;
        }

        .login-form .form-control {
            padding-left: 3rem;
        }

        .form-icon {
            position: absolute;
            left: 1rem;
            top: 2.5rem;
            color: var(--gray-400);
        }

        .login-footer {
            margin-top: 2rem;
            text-align: center;
            color: var(--gray-600);
        }

        .login-footer a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Floating background bubbles -->
        <div class="login-bubble" style="width:90px;height:90px;left:8%;top:12%;animation-duration:7s;"></div>
        <div class="login-bubble" style="width:130px;height:130px;right:6%;top:8%;animation-duration:10s;animation-delay:1s;"></div>
        <div class="login-bubble" style="width:60px;height:60px;left:18%;bottom:18%;animation-duration:8s;animation-delay:2s;"></div>
        <div class="login-bubble" style="width:100px;height:100px;right:12%;bottom:22%;animation-duration:9s;animation-delay:0.5s;"></div>
        <div class="login-bubble" style="width:45px;height:45px;left:48%;top:6%;animation-duration:6s;animation-delay:1.5s;"></div>
        <div class="login-bubble" style="width:70px;height:70px;left:35%;bottom:8%;animation-duration:11s;animation-delay:3s;"></div>

        <div class="login-card" style="animation: loginCardIn 0.7s cubic-bezier(.22,.68,0,1.2) both;">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-boxes"></i>
                </div>
                <h1>Welcome Back</h1>
                <p>Login to InvenTrack</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <i class="fas fa-user form-icon"></i>
                    <input 
                        type="text" 
                        name="username" 
                        class="form-control" 
                        placeholder="Enter your username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <i class="fas fa-lock form-icon"></i>
                    <input 
                        type="password" 
                        name="password" 
                        class="form-control" 
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="login-footer">
                <div style="padding:0.7rem 1rem;background:#fef9c3;border-radius:8px;border:1px solid #fde68a;">
                    <p style="font-size:0.78rem;margin:0 0 4px;font-weight:600;color:#92400e;"><i class="fas fa-user-circle" style="margin-right:4px;"></i> Guest Access</p>
                    <p style="font-size:0.77rem;margin:0;color:#78350f;">Try the system in view-only demo mode.<br>No account needed.</p>
                </div>
                <button type="button" class="btn" onclick="quickDemoLogin()" style="margin-top:10px;width:100%;background:#f59e0b;color:#1e293b;font-weight:700;border:none;font-size:0.95rem;">
                    <i class="fas fa-eye"></i> Try Demo Account
                </button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = e.target.username.value;
            const password = e.target.password.value;

            try {
                const response = await AuthAPI.login({ username, password });
                
                if (response.success) {
                    // Store token and user info
                    Storage.setToken(response.data.token);
                    Storage.setUser({
                        id: response.data.id,
                        username: response.data.username,
                        email: response.data.email,
                        role: response.data.role
                    });
                    window.location.href = 'dashboard.html';
                } else {
                    UI.showError(response.message || 'Login failed');
                }
            } catch (error) {
                UI.showError('Invalid username or password');
            }
        });

        // Check if already logged in
        if (Storage.getToken()) {
            window.location.href = 'dashboard.html';
        }

        // Quick demo login
        async function quickDemoLogin() {
            try {
                const response = await AuthAPI.login({ username: 'demo', password: 'demo001' });
                if (response.success) {
                    Storage.setToken(response.data.token);
                    Storage.setUser({ id: response.data.id, username: response.data.username, email: response.data.email, role: response.data.role });
                    window.location.href = 'dashboard.html';
                } else {
                    UI.showError(response.message || 'Demo login failed');
                }
            } catch (e) {
                UI.showError('Demo login failed: ' + e.message);
            }
        }

        // Ripple effect on all buttons
        document.addEventListener('click', function(e) {
            const btn = e.target.closest('.btn');
            if (!btn) return;
            const ripple = document.createElement('span');
            ripple.className = 'btn-ripple';
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size / 2}px;top:${e.clientY - rect.top - size / 2}px`;
            btn.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());
        });
    </script>
</body>
</html>
