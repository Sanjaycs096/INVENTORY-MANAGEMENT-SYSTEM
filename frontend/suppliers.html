<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suppliers - InvenTrack</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-boxes-stacked"></i>
            <span>InvenTrack</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="products.html"><i class="fas fa-box"></i> Products</a>
            <a href="categories.html"><i class="fas fa-tags"></i> Categories</a>
            <a href="suppliers.html" class="active"><i class="fas fa-truck"></i> Suppliers</a>
            <a href="transactions.html"><i class="fas fa-exchange-alt"></i> Transactions</a>
        </nav>
        <div class="sidebar-footer">
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <div class="main-content">
        <header class="page-header">
            <div>
                <h1>Supplier Management</h1>
                <p>Manage supplier contacts and information</p>
            </div>
            <button class="btn btn-primary demo-restricted" onclick="openSupplierModal()">
                <i class="fas fa-plus"></i> Add Supplier
            </button>
        </header>

        <!-- Search Bar -->
        <div class="card">
            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search suppliers..." oninput="searchSuppliers()">
                </div>
            </div>
        </div>

        <!-- Suppliers Table -->
        <div class="card">
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Contact Person</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Address</th>
                            <th>Products</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="suppliersTableBody">
                        <tr>
                            <td colspan="8" class="text-center">
                                <div class="loading">Loading suppliers...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Supplier Modal -->
    <div id="supplierModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Supplier</h2>
                <span class="close" onclick="closeSupplierModal()">&times;</span>
            </div>
            <form id="supplierForm" onsubmit="handleSupplierSubmit(event)">
                <div class="modal-body">
                    <input type="hidden" id="supplierId">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="supplierName">Supplier Name <span class="required">*</span></label>
                            <input type="text" id="supplierName" class="form-control" required placeholder="e.g., ABC Electronics Ltd.">
                        </div>

                        <div class="form-group">
                            <label for="contactPerson">Contact Person</label>
                            <input type="text" id="contactPerson" class="form-control" placeholder="e.g., John Doe">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="supplierEmail">Email</label>
                            <input type="email" id="supplierEmail" class="form-control" placeholder="supplier@example.com">
                        </div>

                        <div class="form-group">
                            <label for="supplierPhone">Phone</label>
                            <input type="tel" id="supplierPhone" class="form-control" placeholder="+1-234-567-8900">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="supplierAddress">Address</label>
                        <textarea id="supplierAddress" class="form-control" rows="3" placeholder="Full business address"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeSupplierModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Save Supplier
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let suppliers = [];
        let allSuppliers = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            AuthGuard();
            loadSuppliers();
        });

        // Load all suppliers
        async function loadSuppliers() {
            try {
                const response = await SuppliersAPI.getAll();
                if (response.success) {
                    allSuppliers = response.data || [];
                    suppliers = [...allSuppliers];
                    displaySuppliers();
                } else {
                    showAlert('Failed to load suppliers', 'error');
                }
            } catch (error) {
                console.error('Error loading suppliers:', error);
                showAlert('Error loading suppliers', 'error');
            }
        }

        // Display suppliers in table
        function displaySuppliers() {
            const tbody = document.getElementById('suppliersTableBody');
            
            if (suppliers.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="text-center">No suppliers found</td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = suppliers.map(supplier => `
                <tr>
                    <td>${supplier.id || '-'}</td>
                    <td><strong>${supplier.name || '-'}</strong></td>
                    <td>${supplier.contactPerson || '-'}</td>
                    <td>
                        ${supplier.email ? `<a href="mailto:${supplier.email}">${supplier.email}</a>` : '-'}
                    </td>
                    <td>
                        ${supplier.phone ? `<a href="tel:${supplier.phone}">${supplier.phone}</a>` : '-'}
                    </td>
                    <td>${supplier.address || '-'}</td>
                    <td>
                        <span class="badge badge-info" style="white-space: nowrap;">${supplier.productCount || 0} products</span>
                    </td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-icon btn-edit" onclick="editSupplier(${supplier.id})" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn-icon btn-delete" onclick="deleteSupplier(${supplier.id})" title="Delete">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Search suppliers
        function searchSuppliers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (!searchTerm) {
                suppliers = [...allSuppliers];
            } else {
                suppliers = allSuppliers.filter(supplier => 
                    supplier.name?.toLowerCase().includes(searchTerm) ||
                    supplier.contactPerson?.toLowerCase().includes(searchTerm) ||
                    supplier.email?.toLowerCase().includes(searchTerm) ||
                    supplier.phone?.toLowerCase().includes(searchTerm)
                );
            }
            
            displaySuppliers();
        }

        // Open modal for new supplier
        function openSupplierModal() {
            document.getElementById('modalTitle').textContent = 'Add Supplier';
            document.getElementById('supplierForm').reset();
            document.getElementById('supplierId').value = '';
            document.getElementById('supplierModal').style.display = 'block';
        }

        // Edit supplier
        async function editSupplier(id) {
            try {
                const response = await SuppliersAPI.getById(id);
                if (response.success && response.data) {
                    const supplier = response.data;
                    
                    document.getElementById('modalTitle').textContent = 'Edit Supplier';
                    document.getElementById('supplierId').value = supplier.id;
                    document.getElementById('supplierName').value = supplier.name || '';
                    document.getElementById('contactPerson').value = supplier.contactPerson || '';
                    document.getElementById('supplierEmail').value = supplier.email || '';
                    document.getElementById('supplierPhone').value = supplier.phone || '';
                    document.getElementById('supplierAddress').value = supplier.address || '';
                    
                    document.getElementById('supplierModal').style.display = 'block';
                } else {
                    showAlert('Failed to load supplier details', 'error');
                }
            } catch (error) {
                console.error('Error loading supplier:', error);
                showAlert('Error loading supplier details', 'error');
            }
        }

        // Delete supplier
        async function deleteSupplier(id) {
            const supplier = suppliers.find(s => s.id === id);
            const productCount = supplier?.productCount || 0;
            
            if (productCount > 0) {
                showAlert(`Cannot delete supplier with ${productCount} products. Please reassign or delete products first.`, 'warning');
                return;
            }

            if (!confirm('Are you sure you want to delete this supplier?')) {
                return;
            }

            try {
                const response = await SuppliersAPI.delete(id);
                if (response.success) {
                    showAlert('Supplier deleted successfully', 'success');
                    loadSuppliers();
                } else {
                    showAlert(response.message || 'Failed to delete supplier', 'error');
                }
            } catch (error) {
                console.error('Error deleting supplier:', error);
                showAlert('Error deleting supplier', 'error');
            }
        }

        // Handle form submit
        async function handleSupplierSubmit(event) {
            event.preventDefault();

            const supplierData = {
                name: document.getElementById('supplierName').value.trim(),
                contactPerson: document.getElementById('contactPerson').value.trim(),
                email: document.getElementById('supplierEmail').value.trim(),
                phone: document.getElementById('supplierPhone').value.trim(),
                address: document.getElementById('supplierAddress').value.trim()
            };

            const supplierId = document.getElementById('supplierId').value;

            try {
                let response;
                if (supplierId) {
                    // Update existing supplier
                    response = await SuppliersAPI.update(supplierId, supplierData);
                } else {
                    // Create new supplier
                    response = await SuppliersAPI.create(supplierData);
                }

                if (response.success) {
                    showAlert(supplierId ? 'Supplier updated successfully' : 'Supplier created successfully', 'success');
                    closeSupplierModal();
                    loadSuppliers();
                } else {
                    showAlert(response.message || 'Failed to save supplier', 'error');
                }
            } catch (error) {
                console.error('Error saving supplier:', error);
                showAlert('Error saving supplier', 'error');
            }
        }

        // Close modal
        function closeSupplierModal() {
            document.getElementById('supplierModal').style.display = 'none';
            document.getElementById('supplierForm').reset();
        }

        // Logout
        function logout() {
            Storage.clearAuth();
            window.location.href = 'login.html';
        }

        // Close modal on outside click
        window.onclick = function(event) {
            const modal = document.getElementById('supplierModal');
            if (event.target === modal) {
                closeSupplierModal();
            }
        };
    </script>
</body>
</html>
