services:
  - type: web
    name: inventrack-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free

    # Health check — Render uses this to know the app is up
    healthCheckPath: /api/actuator/health

    envVars:
      - key: PORT
        value: 8080

      # ── Database (Supabase) ──────────────────────────────────────────────
      - key: DB_URL
        value: jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0

      - key: DB_USERNAME
        sync: false          # fill in Render dashboard

      - key: DB_PASSWORD
        sync: false          # fill in Render dashboard

      # ── JWT ─────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value

      # ── CORS ────────────────────────────────────────────────────────────
      # Replace with your real Vercel URL after deploying frontend
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:8000,https://inventrack.vercel.app
